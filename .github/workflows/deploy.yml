name: Deploy to server via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/CampusEats
            git pull
            cd backend/src/CampusEats.Api/
            dotnet restore
            dotnet build
            dotnet ef database update
            dotnet publish -c Release -o ~/CampusEatsBackend
            sudo systemctl restart campuseats-api.service
            cd ~/CampusEats/frontend/
            npm install
            npm run build
            sudo rm -rf /var/www/html/campuseats
            sudo cp -r ~/CampusEats/frontend/dist/ /var/www/html/campuseats/
            sudo systemctl reload apache2
